<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Holi AR Filter - Try Now!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    background: #000;
  }

  /* === BAIT SCREEN === */
  #bait {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    padding: 24px;
  }

  .bait-badge {
    background: #ff4757;
    color: #fff;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
    animation: badgePulse 2s infinite;
  }

  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.5); }
    50% { box-shadow: 0 0 0 12px rgba(255, 71, 87, 0); }
  }

  .bait-preview {
    width: min(280px, 70vw);
    height: min(280px, 70vw);
    border-radius: 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .bait-preview::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 40%, rgba(255,107,107,0.4), transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(46,213,115,0.3), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(255,211,42,0.3), transparent 50%);
  }

  .face-icon {
    font-size: min(100px, 25vw);
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }

  .color-dots {
    position: absolute;
    width: 100%; height: 100%;
  }

  .color-dots span {
    position: absolute;
    border-radius: 50%;
    animation: floatDot 3s ease-in-out infinite;
  }

  .color-dots span:nth-child(1) { width: 30px; height: 30px; background: #ff6b6b; top: 15%; left: 10%; animation-delay: 0s; }
  .color-dots span:nth-child(2) { width: 20px; height: 20px; background: #ffd32a; top: 25%; right: 15%; animation-delay: 0.5s; }
  .color-dots span:nth-child(3) { width: 25px; height: 25px; background: #2ed573; bottom: 20%; left: 20%; animation-delay: 1s; }
  .color-dots span:nth-child(4) { width: 18px; height: 18px; background: #1e90ff; bottom: 30%; right: 10%; animation-delay: 1.5s; }
  .color-dots span:nth-child(5) { width: 22px; height: 22px; background: #a55eea; top: 50%; left: 50%; animation-delay: 0.8s; }

  @keyframes floatDot {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-10px) scale(1.15); }
  }

  .bait-title {
    color: #fff;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .bait-sub {
    color: rgba(255,255,255,0.6);
    font-size: clamp(0.8rem, 3vw, 0.95rem);
    text-align: center;
    margin-bottom: 32px;
  }

  .bait-stats {
    display: flex; gap: 20px;
    margin-bottom: 28px;
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
  }

  .bait-stats span { display: flex; align-items: center; gap: 4px; }

  .cam-btn {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: #fff;
    border: none;
    padding: 16px 40px;
    border-radius: 50px;
    font-size: clamp(1rem, 4vw, 1.15rem);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(238, 90, 36, 0.4);
    transition: transform 0.2s;
    display: flex; align-items: center; gap: 10px;
  }

  .cam-btn:active { transform: scale(0.96); }

  .cam-icon {
    width: 24px; height: 24px;
    border: 2.5px solid #fff;
    border-radius: 50%;
    position: relative;
  }

  .cam-icon::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Fake loading */
  #loading {
    position: fixed; inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    color: #fff;
  }

  #loading.show { display: flex; }

  .loader {
    width: 50px; height: 50px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .load-text {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.7);
  }

  /* === PRANK CANVAS === */
  #prank {
    position: fixed; inset: 0;
    display: none;
    z-index: 500;
    background: #111;
  }

  #prank.active { display: block; }

  #mainCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* Overlay messages */
  .msg-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .msg-overlay.show { opacity: 1; }

  .msg-title {
    font-size: clamp(2.5rem, 12vw, 5rem);
    font-weight: 900;
    color: #fff;
    text-align: center;
    text-shadow: 4px 4px 0 #d63031, -3px -3px 0 #6c5ce7, 5px -2px 0 #00b894, -2px 4px 0 #ffd32a;
    line-height: 1;
    padding: 0 16px;
    animation: textPop 0.6s ease-out;
  }

  @keyframes textPop {
    0% { transform: scale(0.1) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .msg-sub {
    font-size: clamp(1rem, 4.5vw, 1.5rem);
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    margin-top: 8px;
    animation: textPop 0.6s 0.3s ease-out both;
  }

  .msg-emoji {
    font-size: clamp(2rem, 8vw, 3.5rem);
    margin-top: 12px;
    animation: textPop 0.6s 0.6s ease-out both;
  }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .bottom-bar.show { opacity: 1; pointer-events: auto; }

  .warn-text {
    background: rgba(0,0,0,0.7);
    color: #ffd32a;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: clamp(0.7rem, 2.5vw, 0.85rem);
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .wipe-btn {
    background: #fff;
    color: #e84393;
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-size: clamp(0.9rem, 3.5vw, 1.05rem);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    pointer-events: auto;
  }

  /* Screen shake */
  .shake { animation: screenShake 0.5s ease-in-out; }

  @keyframes screenShake {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-10px, 6px) rotate(-1deg); }
    20% { transform: translate(10px, -6px) rotate(1deg); }
    30% { transform: translate(-6px, 10px) rotate(-0.5deg); }
    40% { transform: translate(6px, -10px) rotate(0.5deg); }
    50% { transform: translate(-10px, -6px); }
    60% { transform: translate(10px, 6px); }
    70% { transform: translate(-6px, -10px); }
    80% { transform: translate(6px, 10px); }
    90% { transform: translate(-10px, 6px); }
  }
</style>
</head>
<body>

<!-- BAIT -->
<div id="bait">
  <div class="bait-badge">TRENDING NOW</div>
  <div class="bait-preview">
    <div class="color-dots">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="face-icon">🤳</div>
  </div>
  <div class="bait-title">Holi AR Color Filter</div>
  <div class="bait-sub">See yourself covered in Holi colors!</div>
  <div class="bait-stats">
    <span>🔥 2.4M tries</span>
    <span>⭐ 4.9 rating</span>
  </div>
  <button class="cam-btn" onclick="startPrank()">
    <div class="cam-icon"></div>
    Enable Camera
  </button>
</div>

<!-- FAKE LOADING -->
<div id="loading">
  <div class="loader"></div>
  <div class="load-text">Accessing camera...</div>
</div>

<!-- PRANK -->
<div id="prank">
  <canvas id="mainCanvas"></canvas>
  <div class="msg-overlay" id="msgOverlay">
    <div class="msg-title">HAPPY HOLI!</div>
    <div class="msg-sub">You just got color-bombed!</div>
    <div class="msg-emoji">💥🎨🤣</div>
  </div>
  <div class="bottom-bar" id="bottomBar">
    <div class="warn-text">⚠️ Holi color stain detected. Auto-clean in 23 hrs 59 min</div>
    <button class="wipe-btn" id="wipeBtn" onclick="wipeAttempt()">Wipe to Clean Screen</button>
  </div>
</div>

<script>
const HOLI_COLORS = [
  [255, 56, 96],   // hot pink / magenta
  [255, 71, 87],   // red
  [255, 107, 107],  // light red
  [255, 165, 2],   // orange
  [255, 211, 42],  // yellow
  [46, 213, 115],  // green
  [0, 206, 201],   // teal
  [30, 144, 255],  // blue
  [108, 92, 231],  // purple
  [165, 94, 234],  // violet
  [253, 121, 168], // pink
  [0, 184, 148],   // emerald
  [225, 112, 85],  // terra cotta
  [232, 67, 147],  // deep pink
];

let canvas, ctx, W, H;
let animating = false;
let wipeCount = 0;
let autoSplatInterval;

function randomColor() {
  return HOLI_COLORS[Math.floor(Math.random() * HOLI_COLORS.length)];
}

function rand(a, b) { return Math.random() * (b - a) + a; }

function startPrank() {
  // Show loading
  document.getElementById('bait').style.display = 'none';
  const loading = document.getElementById('loading');
  loading.classList.add('show');

  // Fake loading delay
  setTimeout(() => {
    loading.style.display = 'none';
    launchColorBomb();
  }, 1800);
}

function launchColorBomb() {
  const prank = document.getElementById('prank');
  prank.classList.add('active');

  canvas = document.getElementById('mainCanvas');
  ctx = canvas.getContext('2d');
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;

  // Vibrate if supported
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300, 100, 500]);

  // Try fullscreen
  try {
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen || function(){}).call(el);
  } catch(e) {}

  // Shake
  prank.classList.add('shake');
  setTimeout(() => prank.classList.remove('shake'), 500);

  // Initial dark background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // MASSIVE initial burst - cover the whole screen
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      splashAt(rand(0, W), rand(0, H), rand(100, Math.max(W, H) * 0.4));
    }, i * 40);
  }

  // Second wave
  setTimeout(() => {
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
    prank.classList.add('shake');
    setTimeout(() => prank.classList.remove('shake'), 500);
    for (let i = 0; i < 25; i++) {
      setTimeout(() => splashAt(rand(0, W), rand(0, H), rand(80, 250)), i * 50);
    }
  }, 1500);

  // Third wave - water balloons
  setTimeout(() => {
    for (let i = 0; i < 20; i++) {
      setTimeout(() => waterBalloon(rand(0, W), rand(0, H)), i * 80);
    }
  }, 3000);

  // Show message
  setTimeout(() => document.getElementById('msgOverlay').classList.add('show'), 800);

  // Show bottom bar
  setTimeout(() => document.getElementById('bottomBar').classList.add('show'), 2500);

  // Continuous splattering
  autoSplatInterval = setInterval(() => {
    for (let i = 0; i < 3; i++) {
      splashAt(rand(0, W), rand(0, H), rand(30, 120));
    }
  }, 800);

  // Touch = smear color
  canvas.addEventListener('touchstart', onTouch, { passive: false });
  canvas.addEventListener('touchmove', onTouch, { passive: false });
  canvas.addEventListener('mousedown', onMouse);
  canvas.addEventListener('mousemove', onMouseMove);

  // Play sound
  playDhol();

  // Dripping effect
  startDrips();
}

// Realistic paint splatter
function splashAt(x, y, size) {
  const color = randomColor();
  const [r, g, b] = color;

  // Main blob
  const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
  gradient.addColorStop(0, `rgba(${r},${g},${b},0.95)`);
  gradient.addColorStop(0.6, `rgba(${r},${g},${b},0.8)`);
  gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);

  ctx.beginPath();
  // Irregular blob shape
  const points = 12;
  for (let i = 0; i <= points; i++) {
    const angle = (i / points) * Math.PI * 2;
    const radius = size * (0.5 + Math.random() * 0.5);
    const px = x + Math.cos(angle) * radius;
    const py = y + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  // Opaque center for solid color
  ctx.beginPath();
  ctx.arc(x, y, size * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${r},${g},${b},0.95)`;
  ctx.fill();

  // Splatter droplets radiating outward
  const droplets = Math.floor(rand(8, 20));
  for (let i = 0; i < droplets; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = size * rand(0.5, 1.5);
    const dx = x + Math.cos(angle) * dist;
    const dy = y + Math.sin(angle) * dist;
    const ds = rand(3, size * 0.15);

    ctx.beginPath();
    ctx.arc(dx, dy, ds, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${rand(0.6, 0.95)})`;
    ctx.fill();

    // Tiny trail from droplet
    if (Math.random() > 0.5) {
      const trailLen = rand(10, 40);
      ctx.beginPath();
      ctx.moveTo(dx, dy);
      ctx.lineTo(dx + Math.cos(angle) * trailLen, dy + Math.sin(angle) * trailLen);
      ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
      ctx.lineWidth = rand(1, 4);
      ctx.stroke();
    }
  }
}

// Water balloon burst effect
function waterBalloon(x, y) {
  const color = randomColor();
  const [r, g, b] = color;
  const size = rand(120, 300);

  // Big opaque splat
  ctx.beginPath();
  const pts = 16;
  for (let i = 0; i <= pts; i++) {
    const a = (i / pts) * Math.PI * 2;
    const rad = size * (0.4 + Math.random() * 0.6);
    const px = x + Math.cos(a) * rad;
    const py = y + Math.sin(a) * rad;
    if (i === 0) ctx.moveTo(px, py);
    else {
      const cp1x = x + Math.cos(a - 0.2) * rad * 1.1;
      const cp1y = y + Math.sin(a - 0.2) * rad * 1.1;
      ctx.quadraticCurveTo(cp1x, cp1y, px, py);
    }
  }
  ctx.closePath();
  ctx.fillStyle = `rgba(${r},${g},${b},0.9)`;
  ctx.fill();

  // Many flying droplets
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = size * rand(0.3, 2);
    ctx.beginPath();
    ctx.arc(x + Math.cos(a) * d, y + Math.sin(a) * d, rand(2, 12), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${rand(0.5, 1)})`;
    ctx.fill();
  }
}

// Dripping effect
function startDrips() {
  setInterval(() => {
    const x = rand(0, W);
    const y = rand(0, H * 0.5);
    const color = randomColor();
    const [r, g, b] = color;
    const dripLength = rand(30, 150);

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + rand(-5, 5), y + dripLength);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.7)`;
    ctx.lineWidth = rand(3, 10);
    ctx.lineCap = 'round';
    ctx.stroke();

    // Drip blob at bottom
    ctx.beginPath();
    ctx.arc(x + rand(-3, 3), y + dripLength, rand(4, 10), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},0.8)`;
    ctx.fill();
  }, 200);
}

// Touch smearing
function onTouch(e) {
  e.preventDefault();
  for (let i = 0; i < e.touches.length; i++) {
    const t = e.touches[i];
    smearColor(t.clientX, t.clientY);
  }
}

let mouseDown = false;
function onMouse(e) { mouseDown = true; smearColor(e.clientX, e.clientY); }
function onMouseMove(e) { if (mouseDown) smearColor(e.clientX, e.clientY); }
document.addEventListener('mouseup', () => mouseDown = false);

function smearColor(x, y) {
  // Big smear
  splashAt(x, y, rand(40, 100));

  // Finger paint trail
  const color = randomColor();
  const [r, g, b] = color;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(x + rand(-30, 30), y + rand(-30, 30), rand(8, 25), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},0.85)`;
    ctx.fill();
  }

  if (navigator.vibrate) navigator.vibrate(30);
}

// Wipe button
function wipeAttempt() {
  wipeCount++;

  if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200, 50, 300]);

  const prank = document.getElementById('prank');
  prank.classList.add('shake');
  setTimeout(() => prank.classList.remove('shake'), 500);

  // EVEN MORE color
  const extra = 15 + wipeCount * 10;
  for (let i = 0; i < extra; i++) {
    setTimeout(() => {
      waterBalloon(rand(0, W), rand(0, H));
    }, i * 30);
  }

  // Additional massive splashes
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      splashAt(rand(0, W), rand(0, H), rand(200, Math.max(W, H) * 0.5));
    }, i * 100);
  }

  const btn = document.getElementById('wipeBtn');
  const msgs = [
    "Haha! Nice try! MORE COLORS! 🎨",
    "You can't escape Holi! 💥",
    "That just made it worse! 🤣",
    "FULL POWER HOLI MODE! 🌈",
    "Give up already! HAPPY HOLI! 🥳",
  ];
  btn.textContent = msgs[Math.min(wipeCount - 1, msgs.length - 1)];
  setTimeout(() => { btn.textContent = "Try Wiping Again?"; }, 2500);

  playDhol();
}

// Dhol beat
function playDhol() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function hit(freq, time, dur, type, vol) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol, ctx.currentTime + time);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + time);
      o.stop(ctx.currentTime + time + dur);
    }

    // Punchy dhol pattern
    const pattern = [
      [75, 0, 0.3, 'sine', 0.6],
      [150, 0, 0.1, 'triangle', 0.3],
      [75, 0.25, 0.15, 'sine', 0.4],
      [180, 0.35, 0.08, 'triangle', 0.25],
      [75, 0.5, 0.3, 'sine', 0.6],
      [200, 0.5, 0.1, 'square', 0.15],
      [85, 0.8, 0.2, 'sine', 0.5],
      [180, 0.9, 0.08, 'triangle', 0.2],
      [75, 1.0, 0.35, 'sine', 0.6],
      [200, 1.0, 0.12, 'triangle', 0.3],
      [90, 1.25, 0.15, 'sine', 0.4],
      [250, 1.3, 0.06, 'square', 0.15],
      [75, 1.5, 0.3, 'sine', 0.55],
    ];

    pattern.forEach(p => hit(...p));
    pattern.forEach(p => hit(p[0], p[1] + 1.7, p[2], p[3], p[4] * 0.8));
  } catch(e) {}
}

// Handle resize
window.addEventListener('resize', () => {
  if (canvas) {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
});
</script>

</body>
</html>
